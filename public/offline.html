<!doctype html>

<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#ff7a00" />
        <title>Offline - Asaba Hustle</title>

        <link rel="icon" href="/images/icons/icon-192.png" />

        <style>
            :root {
                --primary: #ff7a00;
                --bg: #f9fafb;
                --text: #1f2937;
                --muted: #6b7280;
            }

            body {
                margin: 0;
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    sans-serif;
                background: var(--bg);
                color: var(--text);
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .container {
                text-align: center;
                padding: 24px;
                max-width: 420px;
            }

            .logo {
                width: 90px;
                height: 90px;
                margin-bottom: 20px;
                animation: float 2s ease-in-out infinite;
            }

            @keyframes float {
                0%,
                100% {
                    transform: translateY(0);
                }
                50% {
                    transform: translateY(-6px);
                }
            }

            h1 {
                font-size: 22px;
                margin-bottom: 10px;
            }

            p {
                font-size: 14px;
                color: var(--muted);
                margin-bottom: 20px;
            }

            .btn {
                background: var(--primary);
                color: #fff;
                padding: 10px 18px;
                border-radius: 10px;
                text-decoration: none;
                font-weight: 500;
                display: inline-block;
                transition: 0.2s;
            }

            .btn:active {
                transform: scale(0.97);
            }

            .status {
                margin-top: 15px;
                font-size: 13px;
                color: var(--muted);
            }

            .dot {
                display: inline-block;
                width: 8px;
                height: 8px;
                border-radius: 50%;
                margin-right: 6px;
                background: red;
            }

            .online .dot {
                background: green;
            }

            .pulse {
                animation: pulse 1.2s infinite;
            }

            @keyframes pulse {
                0% {
                    opacity: 1;
                }
                50% {
                    opacity: 0.4;
                }
                100% {
                    opacity: 1;
                }
            }
        </style>
    </head>

    <body>
        <div class="container" id="app">
            <img src="/images/icons/asaba-hustle.png" class="logo" alt="Asaba Hustle" />

            <h1>No Internet Connection</h1>

            <p>
                We're trying to reconnect you.<br />
                Please check your network.
            </p>

            <a href="/" class="btn" id="retryButton">Retry</a>

            <div class="status" id="status">
                <span class="dot pulse"></span>
                <span id="statusText">Offline</span>
            </div>
        </div>

        <script>
            const params = new URLSearchParams(window.location.search);
            const retryUrl = params.get("retry") || "/";
            const statusEl = document.getElementById("status");
            const statusText = document.getElementById("statusText");
            const retryButton = document.getElementById("retryButton");

            retryButton.setAttribute("href", retryUrl);

            function updateStatus() {
                if (navigator.onLine) {
                    statusEl.classList.add("online");
                    statusText.textContent = "Back online - retrying your page";

                    setTimeout(() => {
                        window.location.href = retryUrl;
                    }, 2000);
                } else {
                    statusEl.classList.remove("online");
                    statusText.textContent = "Offline - reconnecting...";
                }
            }

            updateStatus();

            window.addEventListener("online", updateStatus);
            window.addEventListener("offline", updateStatus);
        </script>
    </body>
</html>
